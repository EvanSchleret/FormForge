name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feat/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }} · Testbench ${{ matrix.testbench }} · ${{ matrix.dependency-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: "8.2"
            laravel: "12.*"
            testbench: "^10.0"
            dependency-version: "prefer-stable"
          - php: "8.2"
            laravel: "12.*"
            testbench: "^10.0"
            dependency-version: "prefer-lowest"
          - php: "8.3"
            laravel: "12.*"
            testbench: "^10.0"
            dependency-version: "prefer-stable"
          - php: "8.4"
            laravel: "12.*"
            testbench: "^10.0"
            dependency-version: "prefer-stable"
          - php: "8.3"
            laravel: "13.*"
            testbench: "^11.0"
            dependency-version: "prefer-stable"
          - php: "8.4"
            laravel: "13.*"
            testbench: "^11.0"
            dependency-version: "prefer-stable"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none
          extensions: dom, json, mbstring, pdo_sqlite, sqlite3

      - name: Configure Laravel/Testbench constraints
        run: |
          composer require --no-interaction --no-update \
            "illuminate/console:${{ matrix.laravel }}" \
            "illuminate/database:${{ matrix.laravel }}" \
            "illuminate/filesystem:${{ matrix.laravel }}" \
            "illuminate/http:${{ matrix.laravel }}" \
            "illuminate/support:${{ matrix.laravel }}" \
            "illuminate/validation:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}"

      - name: Install dependencies
        run: composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction --no-progress

      - name: Validate composer.json
        run: composer validate --strict

      - name: Run tests
        run: vendor/bin/pest --colors=never
